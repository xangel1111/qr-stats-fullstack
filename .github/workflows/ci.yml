name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-api/go.mod
          cache-dependency-path: go-api/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  node-api:
    name: Node API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: node-api/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
